<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hamu</title>
    <meta
      name="description"
      content="Hamu is a tiny cozy game for bright little breaks."
    >
    <link rel="preload" href="background.png" as="image">
    <link rel="preload" href="icon.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="landing" aria-labelledby="page-title">
      <img
        class="app-icon"
        src="icon.png"
        width="1254"
        height="1254"
        alt="Hamu app icon"
      >

      <div class="copy">
        <h1 id="page-title">Hamu</h1>
        <p>A tiny cozy game for bright little breaks.</p>
      </div>

      <div class="actions" aria-label="Hamu links">
        <a
          class="app-store-button"
          href="https://apps.apple.com/app/id0000000000"
          target="_blank"
          rel="noopener noreferrer"
        >
          Download on the App Store
        </a>
        <div class="support-contact" aria-label="Support contact">
          <a
            class="support-link"
            href="mailto:hamurace@gmail.com?subject=Hamu%20Race%20Support"
          >
            Email support
          </a>
          <button
            class="copy-email-button"
            type="button"
            data-support-email="hamurace@gmail.com"
          >
            Copy email
          </button>
          <span class="support-email">hamurace@gmail.com</span>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <a
        class="privacy-link"
        href="Hamu_Race_Privacy_Policy_edited%5D.pdf"
        target="_blank"
        rel="noopener noreferrer"
      >
        Privacy Policy
      </a>
    </footer>
    <script>
      const copyButton = document.querySelector(".copy-email-button");

      copyButton?.addEventListener("click", async () => {
        const email = copyButton.dataset.supportEmail;
        const originalLabel = copyButton.textContent;

        try {
          if (navigator.clipboard) {
            await navigator.clipboard.writeText(email);
          } else {
            const textArea = document.createElement("textarea");
            textArea.value = email;
            textArea.setAttribute("readonly", "");
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            document.body.append(textArea);
            textArea.select();
            document.execCommand("copy");
            textArea.remove();
          }

          copyButton.textContent = "Copied";
          window.setTimeout(() => {
            copyButton.textContent = originalLabel;
          }, 1800);
        } catch {
          copyButton.textContent = email;
        }
      });
    </script>
  </body>
</html>
